# ============================================================
# GitHub Actions 工作流 — 自动编译 Kivy App → APK
# ============================================================
# 工作原理：
#   每次你 git push 代码到 GitHub，Actions 就会在云端
#   Ubuntu 服务器上自动运行此文件中的步骤，最终生成 APK。
#
# 触发条件：
#   - 推送代码到 main 分支
#   - 或创建 Pull Request
# ============================================================

name: 编译 APK

on:
  push:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🔨 编译 APK
        run: |
          echo y | docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            kivy/buildozer:latest \
            buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: myapp-apk
          path: bin/*.apk
